version: "3.9"

services:
  # ── PostgreSQL Database ────────────────────────
  db:
    image: postgres:16-alpine
    container_name: autoapply-db
    environment:
      POSTGRES_DB: autoapply
      POSTGRES_USER: autoapply
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoapply"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── FastAPI Backend ────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoapply-api
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config:/app/config
      - ./.env:/app/.env
      - browser-data:/root/.autoapply
    environment:
      - DATABASE_URL=postgresql+asyncpg://autoapply:${DB_PASSWORD:-changeme}@db:5432/autoapply
    restart: unless-stopped

  # ── React Dashboard ────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: autoapply-dashboard
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  browser-data:
