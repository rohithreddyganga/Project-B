<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoApply — Command Center</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #09090b; --bg-secondary: #111113; --bg-tertiary: #18181b;
      --bg-elevated: #1c1c21; --bg-hover: #222228;
      --border: #27272a; --border-light: #3f3f46;
      --text-primary: #fafafa; --text-secondary: #a1a1aa; --text-muted: #71717a;
      --cyan: #22d3ee; --cyan-dim: #0e7490; --cyan-bg: rgba(34,211,238,0.08);
      --green: #4ade80; --green-dim: #166534; --green-bg: rgba(74,222,128,0.08);
      --red: #f87171; --red-dim: #991b1b; --red-bg: rgba(248,113,113,0.08);
      --amber: #fbbf24; --amber-dim: #92400e; --amber-bg: rgba(251,191,36,0.08);
      --purple: #a78bfa; --purple-dim: #5b21b6; --purple-bg: rgba(167,139,250,0.08);
      --blue: #60a5fa; --blue-bg: rgba(96,165,250,0.08);
      --sidebar-w: 240px;
    }
    html, body, #root { height: 100%; width: 100%; }
    body {
      background: var(--bg-primary); color: var(--text-primary);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
    input, select, textarea, button { font-family: inherit; }
    a { color: var(--cyan); text-decoration: none; }
    a:hover { text-decoration: underline; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    .mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
