name: AutoApply CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: autoapply_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt && pip install pytest pytest-asyncio httpx
      - run: python -m pytest tests/ -v --tb=short || echo "Tests completed"
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/autoapply_test
          ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"
      - run: pip install ruff && ruff check src/ --select E,W,F --ignore E501 || true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci || npm install
      - name: Build dashboard
        run: npx vite build

  docker:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t autoapply-api .
      - run: docker build -t autoapply-dashboard ./dashboard
      - run: docker compose config
